# knowledgeLLM stack (R21): the app + cyborgdb-service in standalone/disk mode.
# Ollama is external (R22) — set its URL during in-app setup. Inside this
# network, "localhost" is the container, so point Ollama at host.docker.internal
# (Mac/Windows) or your host LAN IP. See .env.example.

services:
  app:
    build: .
    env_file: .env
    environment:
      # Reach cyborgdb-service over the compose network, not localhost.
      CYBORGDB_URL: http://cyborgdb-service:8000
      DATABASE_URL: file:/data/app.db
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - app_data:/data
    depends_on:
      cyborgdb-service:
        condition: service_healthy

  cyborgdb-service:
    image: cyborginc/cyborgdb-service:0.17.0
    environment:
      # Standalone disk (RocksDB) backend — persisted in the volume below.
      CYBORGDB_DB_TYPE: disk
      # Both keys are OPTIONAL (see Docker Hub docs):
      #   CYBORGDB_SERVICE_ROOT_KEY — service auth; UNSET = auth disabled (the
      #     default here). Set it (and matching CYBORGDB_API_KEY in the app .env)
      #     to require auth. Blank = disabled, which is fine for local/self-host.
      #   CYBORGDB_LICENSE_KEY      — cyborgdb-core license; unset = free tier
      #     (1M items/index). Maps to the service's own CYBORGDB_API_KEY env.
      CYBORGDB_SERVICE_ROOT_KEY: ${CYBORGDB_API_KEY:-}
      CYBORGDB_API_KEY: ${CYBORGDB_LICENSE_KEY:-}
    volumes:
      - cyborgdb_data:/app/cyborgdb_data
    healthcheck:
      test: ["CMD", "sh", "-c", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  app_data:
  cyborgdb_data:
