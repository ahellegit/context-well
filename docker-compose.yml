# Context Well stack (R21): the app + cyborgdb-service in standalone/disk mode.
# Ollama is external (R22) — set its URL during in-app setup. Inside this
# network, "localhost" is the container, so point Ollama at host.docker.internal
# (Mac/Windows) or your host LAN IP. See .env.example.

services:
  app:
    build: .
    env_file: .env
    environment:
      # Reach cyborgdb-service over the compose network, not localhost.
      CYBORGDB_URL: http://cyborgdb-service:8000
      DATABASE_URL: file:/data/app.db
    ports:
      - "${PORT:-3000}:3000"
    # On Linux, host.docker.internal isn't defined by default. Map it to the host
    # gateway so the container can reach a local Ollama on the host. The app's
    # SSRF guard blocks private IP literals (192.168/10/172.16 ranges) but allows
    # this hostname, so host.docker.internal is the supported way in.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_data:/data
    depends_on:
      cyborgdb-service:
        condition: service_healthy

  cyborgdb-service:
    image: cyborginc/cyborgdb-service:0.17.0
    environment:
      # Standalone disk (RocksDB) backend — persisted in the volume below.
      CYBORGDB_DB_TYPE: disk
      # Auth is left disabled (no CYBORGDB_SERVICE_ROOT_KEY) and the free tier is
      # used (no license). Both are optional per the cyborgdb-service docs; add
      # `CYBORGDB_API_KEY: cyborg_...` here for a paid license if you have one.
      # Embedding speed: in online mode the service re-validates the embedding
      # model against huggingface.co on EVERY query (~2s/query). Once the model
      # is cached in the hf_cache volume below, set CYBORGDB_HF_OFFLINE=1 in .env
      # and recreate this service to skip those calls (~2250ms -> ~65ms/query).
      # Default 0 so a fresh deploy can download the model on first use.
      # See docs/CYBORGDB-ISSUES.md #1.
      HF_HUB_OFFLINE: ${CYBORGDB_HF_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${CYBORGDB_HF_OFFLINE:-0}
    volumes:
      - cyborgdb_data:/app/cyborgdb_data
      # Persist the downloaded embedding model so it survives restarts and so
      # CYBORGDB_HF_OFFLINE=1 has a populated cache to read from.
      - cyborgdb_hf_cache:/home/cyborguser/.cache/huggingface
    healthcheck:
      test: ["CMD", "sh", "-c", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  app_data:
  cyborgdb_data:
  cyborgdb_hf_cache:
